name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Configure SDK
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bump-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest-apk --repo "${{ github.repository }}" 2>/dev/null \
            && gh release delete latest-apk --repo "${{ github.repository }}" -y --cleanup-tag
          gh release create latest-apk \
            --repo "${{ github.repository }}" \
            --title "Android Bump APK (latest)" \
            --notes "Auto-built from ${GITHUB_SHA}. Install on Android, then set up at https://fluentflier.github.io/Android-Bump/" \
            app/build/outputs/apk/debug/app-debug.apk
