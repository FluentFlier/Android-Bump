name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Deploy Worker
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Skip: add CLOUDFLARE_API_TOKEN to GitHub Secrets, then re-run this workflow."
            exit 0
          fi
          if grep -q "REPLACE_WITH_KV_NAMESPACE_ID" wrangler.toml; then
            KV_ID=$(npx wrangler kv namespace create PROFILES 2>&1 | grep -oE '[a-f0-9]{32}' | head -1)
            sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/$KV_ID/" wrangler.toml
          fi
          DEPLOY_LOG=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_LOG"
          WORKER_URL=$(echo "$DEPLOY_LOG" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo ""
          echo "============================================"
          echo "BACKEND_URL=$WORKER_URL"
          echo "Add GitHub secret BACKEND_URL=$WORKER_URL"
          echo "Then re-run 'Build Android APK' workflow."
          echo "============================================"
